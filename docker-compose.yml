services:
  gamenight:
    build: .
    container_name: gamenight
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./www:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./db:/var/db
      - ./config:/var/config:ro
    networks:
      - default
      - npm_default

  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./waha_data:/app/.sessions
    environment:
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
      - WHATSAPP_HOOK_URL=http://gamenight/wa_webhook.php
      - WHATSAPP_HOOK_EVENTS=message
      - WAHA_PRINT_QR=false
      - WAHA_API_KEY=gamenight-waha-internal
    networks:
      - default

networks:
  npm_default:
    external: true
