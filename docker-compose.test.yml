# Local test environment — run alongside production without conflict.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --build
#   → http://localhost:8081
#
# Stop:
#   docker compose -f docker-compose.test.yml down
#
# This uses separate DB and uploads directories (db-test/, uploads-test/)
# so it never touches production data. Default login: admin@localhost / admin

services:
  gamenight-test:
    build: .
    container_name: gamenight-test
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./www:/var/www/html
      - ./uploads-test:/var/www/html/uploads
      - ./db-test:/var/db
      - ./config:/var/config:ro
